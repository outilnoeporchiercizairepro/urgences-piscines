<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgences Piscines | Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2869BC;
            --secondary: #FD6007;
            --bg-dark: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?auto=format&fit=crop&q=80&w=2070') center/cover;
            opacity: 0.2;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .logo {
            max-width: 150px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--bg-dark);
            font-size: 1.4rem;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.3s;
            outline: none;
            color: var(--bg-dark);
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(40, 105, 188, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 105, 188, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #e53e3e;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        .status-badge {
            display: inline-block;
            background: rgba(40, 105, 188, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Urgences Piscines" class="logo">
        <div class="status-badge">Accès restreint</div>
        <h1>Entrez le code d'accès</h1>
        
        <div class="input-group">
            <input type="password" id="accessCode" placeholder="••••" maxlength="4">
        </div>
        
        <button onclick="checkCode()">Accéder au site</button>
        <p id="error" class="error-msg">Code incorrect. Veuillez réessayer.</p>
    </div>

    <script>
        function checkCode() {
            const code = document.getElementById('accessCode').value;
            const error = document.getElementById('error');
            
            if (code === '2904') {
                window.location.href = 'site.html';
            } else {
                error.style.display = 'block';
                document.getElementById('accessCode').value = '';
                document.getElementById('accessCode').focus();
            }
        }

        // Permettre la validation avec la touche Entrée
        document.getElementById('accessCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkCode();
            }
        });
    </script>
</body>
</html>
